<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
</head>

<body>

<h2 id="title">جاري التحميل...</h2>

<button onclick="logout()">🚪 خروج</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl="PUT_YOUR_URL_HERE";
const supabaseKey="PUT_YOUR_ANON_KEY_HERE";

const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

// 🔥 حل فوري بدون مشاكل session
async function start(){

// إذا ماكو تسجيل
if(!localStorage.getItem("login")){
window.location="login.html";
return;
}

// جلب المستخدم
let {data}=await supabaseClient.auth.getUser();

if(!data.user){
document.getElementById("title").innerText="❌ خطأ تسجيل";
return;
}

document.getElementById("title").innerText=
"مرحباً "+data.user.email;

}

// خروج
async function logout(){
localStorage.removeItem("login");
await supabaseClient.auth.signOut();
window.location="login.html";
}

start();

</script>

</body>
</html>
