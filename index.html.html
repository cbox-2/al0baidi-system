<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body>

<h2>تسجيل دخول</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signup()">تسجيل جديد</button>
<button onclick="login()">دخول</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl="PUT_YOUR_URL_HERE";
const supabaseKey="PUT_YOUR_ANON_KEY_HERE";

const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

// تسجيل جديد
async function signup(){

let email=emailInput();
let password=passInput();

let {error}=await supabaseClient.auth.signUp({email,password});

if(error){alert(error.message);}
else{alert("تم إنشاء الحساب ✔");}

}

// تسجيل دخول (مهم)
async function login(){

let email=emailInput();
let password=passInput();

let {data,error}=await supabaseClient.auth.signInWithPassword({
email,
password
});

if(error){
alert(error.message);
return;
}

// 🔥 أهم سطر (يحفظ الجلسة)
localStorage.setItem("login","true");

window.location="dashboard.html";
}

function emailInput(){
return document.getElementById("email").value;
}

function passInput(){
return document.getElementById("password").value;
}

</script>

</body>
</html>
